name: Build superbundle ipk
on:
  workflow_dispatch:
  schedule:
    - cron: "1 22 * * 2"
  push:
    branches:
      - "master"
    paths-ignore:
      - "**/README.md"
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout the "master" branch of this repo
        uses: actions/checkout@v2
        with:
          ref: master
      - name: Download components
        run: bash -x scripts/01-download.sh
        shell: bash
      - name: Prepare files
        run: bash -x scripts/02-prepare.sh
        shell: bash
      - name: Create packages
        run: bash -x scripts/03-package.sh
        shell: bash
      - name: Check if release needed
        run: |
          # Check if old and new checksums are different
          if [ -f "scripts/sha256sum.txt" ] && [ -f "scripts/old.sha256sum.txt" ]; then
            if diff -q scripts/sha256sum.txt scripts/old.sha256sum.txt >/dev/null 2>&1; then
              echo "No changes detected - skipping publication"
              echo "NEED_PUBLISH=false" >> $GITHUB_ENV
            else
              echo "Changes detected - creating new release"
              echo "NEED_PUBLISH=true" >> $GITHUB_ENV
            fi
          else
            echo "No comparison available - creating new release"
            echo "NEED_PUBLISH=true" >> $GITHUB_ENV
          fi
      - name: Set release info
        if: env.NEED_PUBLISH == 'true'
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> $GITHUB_ENV
      - name: Prepare for publish
        if: env.NEED_PUBLISH == 'true'
        run: bash -x scripts/04-publish.sh
        shell: bash
      - if: env.NEED_PUBLISH == 'true'
        name: Release and upload assets
        uses: softprops/action-gh-release@v0.1.6
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            /tmp/pub/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
