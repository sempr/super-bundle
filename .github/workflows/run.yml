name: Build superbundle ipk
on:
  workflow_dispatch:
  schedule:
    - cron: "1 22 * * 2"
  push:
    branches:
      - "master"
    paths-ignore:
      - "**/README.md"
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout the "master" branch of this repo
        uses: actions/checkout@v2
        with:
          ref: master
      - name: Download components
        run: bash -x scripts/01-download.sh
        shell: bash
      - name: Prepare files
        run: bash -x scripts/02-prepare.sh
        shell: bash
      - name: Create packages
        run: bash -x scripts/03-package.sh
        shell: bash
      - name: Check if release needed
        run: |
          cd scripts
          # Get only data/* entries for comparison (only data directory matters)
          echo "Extracting data/ directory checksums..."
          if [ -f "sha256sum.txt" ]; then
            grep "^data/" sha256sum.txt > new_data_checksums.txt || echo "No data/ entries found in checksum file"
          else
            echo "Warning: sha256sum.txt not found"
            touch new_data_checksums.txt
          fi

          # Compare data directory checksums
          if [ -f "new_data_checksums.txt" ] && [ -f "old.sha256sum.txt" ]; then
            if diff -q new_data_checksums.txt old.sha256sum.txt >/dev/null 2>&1; then
              echo "No changes in data/ directory - skipping publication"
              echo "NEED_PUBLISH=false" >> $GITHUB_ENV
            else
              echo "Changes detected in data/ directory - creating new release"
              echo "NEED_PUBLISH=true" >> $GITHUB_ENV

              # Show what changed
              echo "Differences in data/ directory:"
              diff new_data_checksums.txt old.sha256sum.txt || true
            fi
          else
            echo "No comparison available - creating new release"
            echo "NEED_PUBLISH=true" >> $GITHUB_ENV
          fi
        shell: bash
      - name: Set release info
        if: env.NEED_PUBLISH == 'true'
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> $GITHUB_ENV
      - name: Prepare for publish
        if: env.NEED_PUBLISH == 'true'
        run: bash -x scripts/04-publish.sh
        shell: bash
      - if: env.NEED_PUBLISH == 'true'
        name: Release and upload assets
        uses: softprops/action-gh-release@v0.1.6
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            /tmp/pub/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
